<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/web03/assets/titleicon-CdYWyvpY.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://js.tosspayments.com/v2/standard"></script>
    <title>젠틀몬스터 공식 온라인 스토어</title>
    

    <!-- 구글 폰트(Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --black: #0d0d0d;
        --white: #f2f0eb;
        --gray: #888;
        --accent: #b8a898;
        --font-title: 'Bebas Neue', sans-serif;
        --font-serif: 'Cormorant Garamond', serif;
        --font-body: 'DM Sans', sans-serif;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: var(--black);
        color: var(--white);
        font-family: var(--font-body);
        font-weight: 300;
        overflow-x: hidden;
      }

      /* 스크롤바 */
      ::-webkit-scrollbar {
        width: 2px;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent);
      }

      /* 로딩 화면 */
      #loader {
        position: fixed;
        inset: 0;
        background: var(--black);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }

      #loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #loader span {
        font-family: var(--font-title);
        font-size: 80px;
        letter-spacing: 0.3em;
        color: var(--white);
        animation: fadeIn 1s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Vue 앱 */
      #app {
        min-height: 100vh;
      }
    </style>
    <script type="module" crossorigin src="/web03/assets/index-CWEPX1lC.js"></script>
    <link rel="stylesheet" crossorigin href="/web03/assets/index-BLFXHwau.css">
  </head>

  <body>

    <!-- 로딩 화면 텍스트 -->
    <div id="loader">
      <span>GENTLE MONSTER</span>
    </div>

    <!-- Vue 앱 -->
    <div id="app"></div>

    <script>
      // 로더 자동 제거
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('loader')
          loader.classList.add('fade-out')
          setTimeout(() => loader.remove(), 700)
        }, 1200)
      })
      
    </script>
  </body>
</html>
